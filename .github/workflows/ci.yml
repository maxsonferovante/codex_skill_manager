name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Run backend tests
        working-directory: apps/desktop/src-tauri
        run: cargo test

  frontend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/desktop/package-lock.json
      - name: Install frontend dependencies
        run: npm ci --include-workspace-root=false
      - name: Run frontend build
        run: npm run build

  release:
    if: github.ref == 'refs/heads/main'
    needs:
      - backend-tests
      - frontend-tests
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: universal-apple-darwin
            artifact_name: codex-skill-manager-macos
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: codex-skill-manager-windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/desktop/package-lock.json
      - name: Install frontend dependencies
        working-directory: apps/desktop
        run: npm ci --include-workspace-root=false
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build desktop app
        working-directory: apps/desktop
        run: npm run tauri:build
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            apps/desktop/src-tauri/target/release/bundle/**
            apps/desktop/src-tauri/target/release/*.exe
            apps/desktop/src-tauri/target/release/*.dmg

  publish-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - backend-tests
      - frontend-tests
      - release
    runs-on: ubuntu-latest
    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: codex-skill-manager-macos
          path: dist/macos
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: codex-skill-manager-windows
          path: dist/windows
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/macos/**
            dist/windows/**
