name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag to create or publish"
        required: true
        default: "v0.1.0-test"
      release_name:
        description: "GitHub Release title"
        required: true
        default: "Codex Skill Manager test release"
      draft:
        description: "Create as draft"
        required: true
        type: boolean
        default: true

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            asset_name: codex-skill-manager-macos
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: codex-skill-manager-windows
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/desktop/package-lock.json
      - name: Install frontend dependencies
        run: npm ci --prefix apps/desktop
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install Tauri build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libglib2.0-dev \
            libgtk-3-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            pkg-config \
            patchelf \
            xdg-utils
      - name: Build and upload release asset
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.event.inputs.tag_name || github.ref_name }}
          releaseName: ${{ github.event.inputs.release_name || format('Codex Skill Manager {0}', github.ref_name) }}
          releaseBody: Desktop release for Codex Skill Manager
          releaseDraft: ${{ github.event.inputs.draft || false }}
          prerelease: false
          tauriScript: npm run tauri
          args: --target ${{ matrix.target }}
