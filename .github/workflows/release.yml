name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag to create or publish"
        required: true
        default: "v0.1.0-test"
      publish_release:
        description: "Publish a GitHub Release after building"
        required: true
        type: boolean
        default: false

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: codex-skill-manager-macos
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: codex-skill-manager-windows
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/desktop/package-lock.json
      - name: Install frontend dependencies
        run: npm ci --prefix apps/desktop
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build Tauri bundles
        working-directory: apps/desktop
        run: npm run tauri:build -- --target ${{ matrix.target }}
      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/*.exe
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/*.dmg
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/*.msi
      - name: Build notice
        run: echo "::notice::Build finished for ${{ matrix.os }} (${{ matrix.target }})"

  publish-release:
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish_release)
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: codex-skill-manager-macos
          path: dist/macos
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: codex-skill-manager-windows
          path: dist/windows
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
          name: Codex Skill Manager ${{ github.event.inputs.tag_name || github.ref_name }}
          body: Desktop release for Codex Skill Manager
          files: |
            dist/macos/**
            dist/windows/**
      - name: Release notice
        run: echo "::notice::Release published for ${{ github.event.inputs.tag_name || github.ref_name }}"
